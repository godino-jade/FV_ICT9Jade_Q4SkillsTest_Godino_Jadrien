<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Q4 Skills Test</title>

    <style>
        body{
            background-color: rgb(118, 118, 118);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
    
        .container-fluid{
            width: 400px;
            margin: auto;
            background-color: rgb(100, 142, 116);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            box-shadow: 5px 5px 15px 5px #0000006d
        }

        #toptext{
            display: block;
            width: 100%;
        }

        .form-control {
            width: 100%;
            border-radius: 10px;
        }

        h1{
            color: #292929;
            font-weight: bold;
        }

        h6{
            color: white;
            background-color: #292929;
            border-radius: 20px;
            padding: 10px;
            display: block;
            display: inline-block;
            width: auto;
        }

        #checkboxcontainer{
            display: flex;
            justify-content: left; 
            align-items: center;     
            gap: 8px;
        } 
    </style>
</head>
<body>
    <div class="container-fluid">
        <form>
            <h1>Login</h1>
                
            <br>

            <label id="toptext"> 
                <h6>Username</h6>
                <input type="text" id="username" class="form-control" placeholder="Enter username here...">
            </label>

            <br>

            <label id="toptext">
                <h6>Password</h6>
                <input type="password" id="pw" class="form-control" placeholder="Enter password here...">
            </label>

            <br>

            <div id="checkboxcontainer">
                <input type="checkbox" id="login" onclick="session()">
                    <label id="checklabel"> Stay logged in</label>
                <br>
                    
                <div id="message"></div>
            </div>

            <br>

            <button type="button" class="btn btn-info" id="logbutton" onclick="checklogin()">Login</button>
            <button type="button" class="btn btn-light" onclick="window.location.reload()">Cancel</button>
        </form>
    </div>

    <script>
        let attempt_counter = 0;
        function checklogin(){
            let inputusername = document.getElementById("username").value;
            let inputpw = document.getElementById("pw").value;

            do {
                    if (inputusername === "jadegodino" && inputpw === "12345") {
                        alert("Your login is successful!");
                        attempt_counter = 0; // reset after success
                        document.getElementById("message").innerHTML = "Access granted!";
                        window.location.href = "notebooks.html"; //go to second page
                        break; // stop loop

                    } else {
                        attempt_counter++;
                        document.getElementById("message").innerHTML =
                            "Incorrect username and/or password. Attempt " + attempt_counter + " of 3 ";
                    }

                } while (false); 
                    if (attempt_counter >= 3) {
                        alert("Too many failed attempts. Access Locked. ");
                        document.getElementById("logbutton").disabled = true; // lock button
                }
        }

        function session() {
            let staylogin = document.getElementById("login").checked 
            let msgpopup = document.getElementById("message")

            switch(staylogin) {
                case true:
                msgpopup.innerHTML = "<i>Your session will stay active on this device.</i>";
                break;

                case false:
                msgpopup.innerHTML = "";
                break;
            }
        }
        

    </script>
    
</body>
</html>
